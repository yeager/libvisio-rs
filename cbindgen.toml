language = "C"
include_guard = "LIBVISIO_RS_H"
autogen_warning = "/* This file is auto-generated by cbindgen. Do not edit. */"
tab_width = 4
style = "both"
cpp_compat = true

[export]
exclude = ["Document", "Page", "Shape", "CellValue", "GeomRow", "GeomSection",
           "CharFormat", "ParaFormat", "TextPart", "ForeignDataInfo", "Hyperlink",
           "GradientStop", "GradientDef", "FillPatternDef", "Connect", "LayerDef",
           "StyleSheet", "PageInfo", "XForm", "TextXForm", "XForm1D",
           "ChunkHeader", "Pointer"]

[export.rename]
"VisioDocument" = "VisioDocument"

[fn]
prefix = "LIBVISIO_API"

[parse]
parse_deps = false
